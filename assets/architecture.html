<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cloud Run Sandbox × ADK architecture</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 1600px; height: 900px; overflow: hidden; }
  body { font-family: "Google Sans", "Google Sans Flex", Arial, sans-serif; background: #f8fafd; color: #202124; }
  .canvas { width: 1600px; height: 900px; padding: 48px 56px; background:
    linear-gradient(#e8eaed 1px, transparent 1px), linear-gradient(90deg, #e8eaed 1px, transparent 1px);
    background-size: 40px 40px; }
  h1 { margin: 0; font-size: 42px; letter-spacing: -1.1px; font-weight: 650; }
  .sub { margin-top: 8px; color: #5f6368; font-size: 20px; }
  svg { width: 1488px; height: 710px; margin-top: 28px; overflow: visible; }
  .label { font: 600 18px "Google Sans", Arial; fill: #202124; }
  .small { font: 500 14px "Google Sans", Arial; fill: #5f6368; }
  .tiny { font: 600 12px "Google Sans", Arial; fill: #5f6368; letter-spacing: .35px; }
  .zone-title { font: 650 14px "Google Sans", Arial; letter-spacing: 1.2px; }
  .box { fill: #fff; stroke-width: 2; rx: 18; }
  .arrow { fill: none; stroke: #5f6368; stroke-width: 2.5; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 8 7; }
</style>
</head>
<body>
<div class="canvas">
  <h1>One trusted control plane. One disposable execution plane.</h1>
  <div class="sub">Gemini 3.5 Flash plans the review; native Cloud Run sandboxes contain repository code.</div>
  <svg viewBox="0 0 1488 710" role="img" aria-label="Architecture diagram">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5f6368"/></marker>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".10"/></filter>
    </defs>

    <rect x="18" y="46" width="250" height="558" rx="26" fill="#fff" stroke="#d2e3fc" stroke-width="2"/>
    <text x="40" y="78" class="zone-title" fill="#1967d2">DEVELOPER</text>
    <rect class="box" filter="url(#shadow)" x="48" y="122" width="190" height="112" stroke="#4285f4"/>
    <circle cx="83" cy="157" r="16" fill="#e8f0fe"/><path d="M76 158h14M83 151v14" stroke="#1967d2" stroke-width="2"/>
    <text x="109" y="158" class="label">ADK Web</text>
    <text x="72" y="190" class="small">Prompt + event trace</text>
    <text x="72" y="212" class="small">Code/tool inspection</text>
    <rect class="box" x="48" y="282" width="190" height="112" stroke="#34a853"/>
    <text x="72" y="322" class="label">Evidence harness</text>
    <text x="72" y="351" class="small">Raw JSON events</text>
    <text x="72" y="373" class="small">Latency distributions</text>

    <rect x="310" y="46" width="790" height="558" rx="26" fill="#fff" stroke="#c4eed0" stroke-width="2"/>
    <text x="334" y="78" class="zone-title" fill="#188038">CLOUD RUN SERVICE INSTANCE · TRUSTED HOST</text>
    <rect class="box" filter="url(#shadow)" x="350" y="116" width="284" height="126" stroke="#4285f4"/>
    <text x="378" y="154" class="label">Google ADK 2.4.0</text>
    <text x="378" y="184" class="small">sandbox_pr_reviewer agent</text>
    <text x="378" y="208" class="small">Metadata-only audit records</text>

    <rect class="box" x="686" y="116" width="360" height="126" stroke="#f9ab00"/>
    <text x="716" y="154" class="label">Fixed lifecycle tools</text>
    <text x="716" y="184" class="small">start → probe → test → patch</text>
    <text x="716" y="208" class="small">snapshot → delete · argv-safe broker</text>

    <rect x="350" y="302" width="696" height="250" rx="22" fill="#f8fafd" stroke="#9aa0a6" stroke-width="2" stroke-dasharray="9 7"/>
    <text x="374" y="334" class="zone-title" fill="#5f6368">NATIVE CHILD SANDBOX · UNTRUSTED EXECUTION</text>
    <rect class="box" x="382" y="365" width="222" height="132" stroke="#ea4335"/>
    <text x="410" y="403" class="label">Repository process</text>
    <text x="410" y="433" class="small">pytest / build hooks</text>
    <text x="410" y="457" class="small">generated patch</text>
    <text x="410" y="481" class="small">20–120 s host timeout</text>

    <rect class="box" x="640" y="365" width="178" height="132" stroke="#34a853"/>
    <text x="668" y="403" class="label">/workspace</text>
    <text x="668" y="433" class="small">Per-request bind mount</text>
    <text x="668" y="457" class="small">Only approved export</text>
    <text x="668" y="481" class="small">Writable</text>

    <rect class="box" x="854" y="365" width="160" height="132" stroke="#9aa0a6"/>
    <text x="882" y="403" class="label">Host rootfs</text>
    <text x="882" y="433" class="small">Read-only</text>
    <text x="882" y="457" class="small">Not confidential</text>
    <text x="882" y="481" class="small">No env/metadata</text>

    <rect x="1142" y="46" width="328" height="558" rx="26" fill="#fff" stroke="#fce8b2" stroke-width="2"/>
    <text x="1166" y="78" class="zone-title" fill="#b06000">MANAGED SERVICES</text>
    <rect class="box" filter="url(#shadow)" x="1182" y="116" width="248" height="126" stroke="#4285f4"/>
    <text x="1212" y="154" class="label">Gemini 3.5 Flash</text>
    <text x="1212" y="184" class="small">GA · global endpoint</text>
    <text x="1212" y="208" class="small">Plans; never runs repo code</text>
    <rect class="box" x="1182" y="302" width="248" height="104" stroke="#34a853"/>
    <text x="1212" y="340" class="label">Cloud Logging</text>
    <text x="1212" y="370" class="small">Hash · outcome · latency</text>
    <rect class="box" x="1182" y="448" width="248" height="104" stroke="#a142f4"/>
    <text x="1212" y="486" class="label">Optional Cloud Storage</text>
    <text x="1212" y="516" class="small">Durable tar beyond instance</text>

    <path class="arrow" d="M238 178 H350"/>
    <path class="arrow" d="M634 178 H686"/>
    <path class="arrow" d="M1046 164 C1090 164 1110 164 1182 164"/>
    <path class="arrow" d="M866 242 V302"/>
    <path class="arrow" d="M686 431 H604"/>
    <path class="arrow" d="M640 470 H604"/>
    <path class="arrow" d="M1046 260 C1100 260 1110 354 1182 354"/>
    <path class="arrow dash" d="M1046 522 H1182"/>

    <g transform="translate(350,625)">
      <rect width="1090" height="60" rx="16" fill="#202124"/>
      <text x="28" y="27" class="tiny" style="fill:#8ab4f8">DEFAULT DENY</text>
      <text x="28" y="47" class="small" style="fill:#e8eaed">Outbound network · parent environment · metadata server</text>
      <text x="470" y="27" class="tiny" style="fill:#81c995">SHARED METER</text>
      <text x="470" y="47" class="small" style="fill:#e8eaed">Sandbox consumes the host instance’s allocated CPU and memory</text>
    </g>
  </svg>
</div>
</body>
</html>
